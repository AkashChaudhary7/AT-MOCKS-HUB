<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#312e81" /> <!-- Indigo 900 -->
      <stop offset="60%" stop-color="#1e1b4b" /> <!-- Indigo 950 -->
      <stop offset="100%" stop-color="#09071f" /> <!-- Deep black -->
    </radialGradient>
    
    <!-- Vivid Accent Gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" /> <!-- Indigo 500 -->
      <stop offset="40%" stop-color="#8b5cf6" /> <!-- Violet 500 -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Pink 500 -->
    </linearGradient>

    <!-- Soft Ambient Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Main Rounded App Icon Shape -->
  <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />

  <!-- Technical Grid overlay for architectural sophistication -->
  <path d="M 0,128 L 512,128 M 0,256 L 512,256 M 0,384 L 512,384 M 128,0 L 128,512 M 256,0 L 256,512 M 384,0 L 384,512" 
        stroke="#ffffff" stroke-width="1" stroke-opacity="0.04" />

  <!-- Glowing inner container border -->
  <rect x="44" y="44" width="424" height="424" rx="84" fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-opacity="0.25" />

  <!-- Shield Shape representing strength & validation -->
  <path d="M 256 100 L 380 140 L 380 280 Q 380 370 256 410 Q 132 370 132 280 L 132 140 Z" 
        fill="#1e1b4b" fill-opacity="0.7" stroke="url(#accentGradient)" stroke-width="3" />

  <!-- Glowing interactive components inside the shield -->
  <g filter="url(#glow)">
    <!-- Checklist Document Base -->
    <rect x="195" y="160" width="122" height="140" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-width="2" stroke-opacity="0.15" />
    
    <!-- Code / Exam lines representing the content -->
    <line x1="215" y1="195" x2="295" y2="195" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.4" />
    <line x1="215" y1="225" x2="295" y2="225" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.4" />
    <line x1="215" y1="255" x2="275" y2="255" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.4" />

    <!-- Highly prominent glowing checkmark representing completed tests & success -->
    <path d="M 175,255 L 225,305 L 345,185" fill="none" stroke="url(#accentGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Ambient background orb -->
  <circle cx="256" cy="256" r="120" fill="#8b5cf6" opacity="0.15" filter="url(#glow)" />
</svg>
